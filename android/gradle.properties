# Project-wide Gradle settings

# JVM Memory
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx3g

# Gradle Performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configureondemand=true

# AndroidX
android.useAndroidX=true

# React Native Architectures
# Use only arm64-v8a for faster builds and smaller APKs
# Add x86_64 if you use Android Emulator
reactNativeArchitectures=arm64-v8a

# New Architecture (TurboModules + Fabric)
newArchEnabled=true

# Hermes Engine
hermesEnabled=true

# Edge-to-Edge
edgeToEdgeEnabled=false

# Kotlin
kotlin.incremental=true
kotlin.code.style=official

# Android Build Optimizations
android.enableJetifier=false

# Build Cache
org.gradle.unsafe.configuration-cache=true

MYAPP_UPLOAD_STORE_FILE=my-upload-key.keystore
MYAPP_UPLOAD_KEY_ALIAS=my-key-alias
MYAPP_UPLOAD_STORE_PASSWORD=your-store-password
MYAPP_UPLOAD_KEY_PASSWORD=your-key-password